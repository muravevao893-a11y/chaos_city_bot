<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Чатоград Bot</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f6f7f9;color:#111827;display:grid;min-height:100vh;place-items:center}
    main{width:min(680px,calc(100vw - 32px));background:white;border:1px solid #e5e7eb;border-radius:24px;padding:28px;box-shadow:0 18px 50px rgba(15,23,42,.08)}
    h1{margin:0 0 10px;font-size:32px}p{line-height:1.55;color:#4b5563}.ok{display:inline-block;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;border-radius:999px;padding:6px 10px;font-size:14px}
    code{background:#f3f4f6;border-radius:8px;padding:2px 6px}
  </style>
</head>
<body>
  <main>
    <span class="ok">server online</span>
    <h1>🏙 Чатоград Bot v0.3</h1>
    <p>Это служебная web-страница. Игровой интерфейс работает прямо в Telegram-группе через кнопки под сообщениями, без Mini App.</p>
    <p>Health endpoint: <code>/api/health</code></p>
  </main>
</body>
</html>
