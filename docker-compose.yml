services:
  postgres:
    image: postgres:16-alpine
    container_name: chatograd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatograd
      POSTGRES_USER: chatograd
      POSTGRES_PASSWORD: chatograd_password
    ports:
      - "5432:5432"
    volumes:
      - chatograd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatograd -d chatograd"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chatograd_postgres_data:
